<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8/3 Special Gift ❤️</title>
    <style>
        @font-face {
    font-family: 'Simple Serenity';
    src: url('DFVN Simple Serenity Serif.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
}
        :root { --primary: #f50b02; --dark: #800000; --ui: #F5F5DC; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Simple Serenity', Geneva, Verdana, sans-serif; }
        
        canvas { position: absolute; inset: 0; z-index: 9000; pointer-events: none; transition: opacity 1.5s ease, filter 1.5s ease; will-change: filter, opacity; }
        #interaction-layer { position: fixed; inset: 0; z-index: 9500; display: none; cursor: pointer; }

        #lock-screen, #main-menu, .section {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), filter 0.6s ease;
            will-change: transform, opacity;
        }
        
        #lock-screen { background: var(--ui); }
        #main-menu, .section { background: none; display: none; opacity: 0; transform: scale(0.95); filter: blur(10px); }
        .active { display: flex !important; opacity: 1 !important; transform: scale(1) !important; filter: blur(0px) !important; }

        .btn-menu {
    padding: 16px 40px;
    background: rgba(255, 255, 255, 0.9);
    color: var(--dark);
    border: none;
    border-radius: 50px;
    margin: 8px;
    width: 280px;
    
    /* CHỈNH FONT TẠI ĐÂY */
    font-family: 'Simple Serenity', Times, serif; 
    font-weight: 700;        /* Làm chữ đậm lên */
    font-size: 1.0rem;      /* Tăng kích thước chữ một chút */
    letter-spacing: 1px;    /* Giúp các chữ cái có khoảng cách thoáng hơn */
    
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    cursor: pointer;
    backdrop-filter: blur(5px);
    transition: 0.3s;
}

        #music-btn { position: fixed; top: 20px; right: 20px; z-index: 10001; background: rgba(255,255,255,0.2); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: none; }

        .card { background: rgba(255,255,255,0.92); padding: 25px; border-radius: 25px; text-align: center; width: 85%; max-width: 360px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); max-height: 85vh; overflow-y: auto; scrollbar-width: none; }
        .card::-webkit-scrollbar { display: none; }

        .profile-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; margin-bottom: 15px; }
        .info-row { text-align: left; margin: 8px 0; padding: 8px 15px; background: rgba(0,0,0,0.03); border-radius: 12px; }
        .info-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .info-value { font-weight: 600; color: var(--dark); display: block; font-size: 0.95rem; }
        /* Chú thích nhỏ phía dưới giá trị chính */
        .info-sub { display: block; font-size: 0.75rem; color: #999; font-style: italic; margin-top: 2px; font-weight: normal;}

        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .photo-item { width: 100%; padding-bottom: 100%; position: relative; border-radius: 12px; overflow: hidden; background: #eee; cursor: zoom-in; }
        .photo-item img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }

        /* Lightbox */
        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 11000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s ease; backdrop-filter: blur(10px); }
        #lightbox.show { display: flex; opacity: 1; }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #lightbox.show img { transform: scale(1); }

        /* Letter Styling */
        #typewriter-text { font-family: 'Times New Roman', serif; font-size: 1.1rem; line-height: 1,6; text-align: left; font-style: italic; color: #444; line-height: 1.8; font-size: 1rem; white-space: pre-wrap; margin: 15px 0; border-left: 2px solid var(--primary); padding-left: 15px; }

        .pass-dots { display: flex; gap: 15px; margin: 30px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #ccc; transition: 0.3s; }
        .dot.active { background: var(--dark); transform: scale(1.3); }
        #passInput { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .hint { color: white; position: absolute; bottom: 15%; width: 100%; text-align: center; z-index: 9001; opacity: 0.5; font-size: 12px; }
    </style>
</head>
<body>

    <button id="music-btn" onclick="toggleMusic()">🎵</button>
    <audio id="bg-music" loop></audio>
    <div id="interaction-layer" onclick="explodeToNebula()"></div>
    <div id="hint" class="hint" style="display:none">CHẠM ĐỂ MỞ KHÓA</div>
    
    <canvas id="pinkboard"></canvas>

    <div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt="Zoomed"></div>

    <div id="lock-screen">
        <h3 style="color: var(--dark); letter-spacing: 5px;">PASSCODE</h3>
        <div class="pass-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <input type="number" id="passInput" pattern="\d*" maxlength="4" autofocus>
    </div>

    <div id="main-menu">
        <h2 style="color: #fff; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,0,0,1);">MY ETERNITY ❤️</h2>
        <button class="btn-menu" onclick="openAbout()">MY BABE</button>
        <button class="btn-menu" onclick="changeSection('main-menu', 'gallery-section')">GALLERY</button>
        <button class="btn-menu" onclick="openLetter()">LETTER</button>
    </div>

    <div id="about-section" class="section">
        <div class="card">
            <img src="Baby13.jpg" alt="Profile" class="profile-img">
            <div class="info-row"><span class="info-label">Họ và Tên</span><span class="info-value">Nguyễn Thị Thanh (ThanhThanh)</span><span class="info-sub">aka: Đẹp nhất thế giới</span></div>
            <div class="info-row"><div><span class="info-label">Tuổi</span><span id="age-num" class="info-value">0</span></div></div>
            <div class="info-row"><span class="info-label">Màu sắc yêu thích</span><span class="info-value">Trắng, Đen, Xám, Đỏ đô, Be tiêu, Nâu tây</span></div>
            <button class="btn-menu" style="width:100%; margin-top:15px;" onclick="changeSection('about-section', 'main-menu')">Quay lại</button>
        </div>
    </div>

    <div id="gallery-section" class="section">
        <div class="card">
            <h3 style="color: var(--dark); margin: 0;">GALLERY</h3>
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 15px;">Chạm vào ảnh để phóng to</p>
            <div class="photo-grid">
                <div class="photo-item"><img src="Baby.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby2.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby3.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby4.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby5.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby6.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby7.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby8.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby9.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby10.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby11.jpg" onclick="zoomImage(this.src)"></div>
                <div class="photo-item"><img src="Baby12.jpg" onclick="zoomImage(this.src)"></div>
            </div>
            <button class="btn-menu" style="width:100%; margin-top:10px;" onclick="changeSection('gallery-section', 'main-menu')">Quay lại</button>
        </div>
    </div>

    <div id="letter-section" class="section">
        <div class="card">
            <h3 style="color: var(--dark); margin-bottom: 5px;">TO MY BABE ❤️</h3>
            <div id="typewriter-text"></div>
            <button class="btn-menu" style="width:100%; margin-top:10px;" onclick="changeSection('letter-section', 'main-menu')">Quay lại</button>
        </div>
    </div>

    <script>
    const CONFIG = { 
        BIRTH_DATE: "2002-08-20", 
        START_DATE: "2023-01-01", 
        PASS_CODE: "2412", 
        MUSIC: "Alex_Warren_-_Ordinary_(mp3.pm).mp3",
        // NỘI DUNG BỨC THƯ TẠI ĐÂY
        LETTER: "Chào em, cô gái tuyệt vời nhất của anh.\nChúc mừng ngày Quốc tế Phụ nữ 8/3! Anh muốn dành những lời tốt đẹp nhất để cảm ơn em vì đã xuất hiện và làm cho cuộc sống của anh trở nên rực rỡ hơn.\nHy vọng em sẽ luôn nở nụ cười tươi tắn trên môi, luôn xinh đẹp và hạnh phúc bên anh nhé. Anh yêu em rất nhiều! ❤️.\nSorry Babe vì web hiện tại có thể chưa được tối ưu, tương lai anh sẽ nâng cấp thêm và cập nhật thêm nếu anh nghĩ ra, Hẹ Hẹ :))))"
    };

    var settings = { particles: { length: 1800, duration: 2, velocity: 100, effect: -0.75, size: 28 } };

    // --- LOGIC TYPEWRITER ---
    let typingTimer = null;
    function startTypewriter() {
        const container = document.getElementById('typewriter-text');
        const text = CONFIG.LETTER;
        let i = 0;
        container.innerText = "";
        clearInterval(typingTimer);

        typingTimer = setInterval(() => {
            if (i < text.length) {
                container.innerText += text.charAt(i);
                i++;
                // Tự động cuộn xuống nếu thư dài
                const card = container.closest('.card');
                card.scrollTop = card.scrollHeight;
            } else {
                clearInterval(typingTimer);
            }
        }, 30); // Tốc độ đánh máy (ms)
    }

    function openLetter() {
        changeSection('main-menu', 'letter-section');
        setTimeout(startTypewriter, 700); // Chờ hiệu ứng chuyển trang xong mới gõ chữ
    }

    // --- CÁC LOGIC CŨ GIỮ NGUYÊN ---
    function zoomImage(src) {
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        lbImg.src = src; lb.style.display = 'flex';
        setTimeout(() => lb.classList.add('show'), 10);
    }
    function closeLightbox() {
        const lb = document.getElementById('lightbox');
        lb.classList.remove('show');
        setTimeout(() => lb.style.display = 'none', 400);
    }
    function Point(x,y){this.x=x||0;this.y=y||0}Point.prototype.clone=function(){return new Point(this.x,this.y)};Point.prototype.length=function(l){if(typeof l=='undefined')return Math.sqrt(this.x*this.x+this.y*this.y);var cur=this.length();this.x*=l/cur;this.y*=l/cur;return this};
    function Particle(){this.position=new Point();this.velocity=new Point();this.acceleration=new Point();this.age=0;this.isExploding=false}
    Particle.prototype.initialize=function(x,y,dx,dy,isExploding=false){this.position.x=x;this.position.y=y;this.velocity.x=dx;this.velocity.y=dy;this.acceleration.x=dx*settings.particles.effect;this.acceleration.y=dy*settings.particles.effect;this.age=0;this.isExploding=isExploding;this.friction=isExploding?(Math.random()*0.1+0.88):1};
    Particle.prototype.update=function(dt){this.position.x+=this.velocity.x*dt;this.position.y+=this.velocity.y*dt;if(this.isExploding){this.velocity.x*=this.friction;this.velocity.y*=this.friction}else{this.velocity.x+=this.acceleration.x*dt;this.velocity.y+=this.acceleration.y*dt}this.age+=dt};
    Particle.prototype.draw=function(ctx,image){function ease(t){return(--t)*t*t+1}var size=image.width*ease(this.age/settings.particles.duration);ctx.globalAlpha=1-this.age/settings.particles.duration;ctx.drawImage(image,this.position.x-size/2,this.position.y-size/2,size,size)};
    function ParticlePool(length){this.particles=new Array(length);for(var i=0;i<length;i++)this.particles[i]=new Particle();this.firstActive=0;this.firstFree=0}
    ParticlePool.prototype.add=function(x,y,dx,dy,isExploding){this.particles[this.firstFree].initialize(x,y,dx,dy,isExploding);this.firstFree=(this.firstFree+1)%this.particles.length;if(this.firstActive==this.firstFree)this.firstActive=(this.firstActive+1)%this.particles.length};
    var canvas=document.getElementById('pinkboard'),context=canvas.getContext('2d'),particles=new ParticlePool(settings.particles.length),state='IDLE',time,dpr=window.devicePixelRatio||1,animationFrameId=null;
    function pointOnHeart(t){return new Point(160*Math.pow(Math.sin(t),3),130*Math.cos(t)-50*Math.cos(2*t)-20*Math.cos(3*t)-10*Math.cos(4*t)+25)}
    var image=(function(){var c=document.createElement('canvas'),cx=c.getContext('2d'),s=settings.particles.size*dpr;c.width=c.height=s;var grad=cx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);grad.addColorStop(0,'#ffffff');grad.addColorStop(0.3,'#f50b02');grad.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=grad;cx.fillRect(0,0,s,s);var img=new Image();img.src=c.toDataURL();return img})();
    function render(){animationFrameId=requestAnimationFrame(render);var newTime=Date.now()/1000,dt=newTime-(time||newTime);time=newTime;context.clearRect(0,0,canvas.width,canvas.height);context.globalCompositeOperation='screen';if(state==='BEATING'){var pulse=(Date.now()%1300)/1300,beat=pulse<0.2?1.1:(pulse<0.4?1.02:1),amount=(settings.particles.length/settings.particles.duration)*dt;for(var i=0;i<amount;i++){var pos=pointOnHeart(Math.PI-2*Math.PI*Math.random()),dir=pos.clone().length(settings.particles.velocity);particles.add(canvas.width/2+pos.x*beat*dpr,canvas.height/2-pos.y*beat*dpr,dir.x*dpr,-dir.y*dpr,false)}}var i=particles.firstActive;while(i!=particles.firstFree){particles.particles[i].update(dt);particles.particles[i].draw(context,image);i=(i+1)%particles.particles.length}}
    function explodeToNebula() {
        state = 'EXPLODE'; var i = particles.firstActive;
        while (i != particles.firstFree) { var p = particles.particles[i]; p.isExploding = true; p.velocity.x *= 8; p.velocity.y *= 8; i = (i + 1) % particles.particles.length; }
        document.getElementById('interaction-layer').style.display = 'none'; document.getElementById('hint').style.display = 'none';
        setTimeout(() => { canvas.style.filter = 'blur(6px)'; canvas.style.opacity = '0.4'; }, 400);
        setTimeout(() => { document.getElementById('main-menu').style.display = 'flex'; setTimeout(() => { document.getElementById('main-menu').classList.add('active'); setTimeout(() => cancelAnimationFrame(animationFrameId), 2000); }, 50); }, 800);
    }
    function changeSection(hideId, showId) {
        if (hideId === 'letter-section') clearInterval(typingTimer); // Tắt đánh máy nếu thoát trang thư
        const h = document.getElementById(hideId), s = document.getElementById(showId);
        h.classList.remove('active');
        setTimeout(() => { h.style.display = 'none'; s.style.display = 'flex'; void s.offsetWidth; s.classList.add('active'); }, 400);
    }
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id); let startT = null;
        const step = (t) => { if(!startT) startT = t; const prog = Math.min((t-startT)/duration, 1); obj.innerText = Math.floor(prog*(end-start)+start); if(prog<1) window.requestAnimationFrame(step); };
        window.requestAnimationFrame(step);
    }
    function openAbout() {
        changeSection('main-menu', 'about-section');
        const b = new Date(CONFIG.BIRTH_DATE), t = new Date();
        let age = t.getFullYear()-b.getFullYear(); if(t.getMonth()<b.getMonth() || (t.getMonth()===b.getMonth() && t.getDate()<b.getDate())) age--;
        setTimeout(() => { animateValue("age-num", 0, age, 1500); }, 600);
    }
    document.getElementById('passInput').addEventListener('input', (e) => {
        var v = e.target.value; document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i<v.length));
        if(v===CONFIG.PASS_CODE){ document.getElementById('lock-screen').style.opacity='0'; setTimeout(unlock, 500); }
    });
    function unlock() {
        document.getElementById('lock-screen').style.display='none'; onResize(); state='BEATING';
        const m = document.getElementById('bg-music'); m.src=CONFIG.MUSIC; m.play().catch(()=>{});
        document.getElementById('music-btn').style.display='block'; document.getElementById('interaction-layer').style.display='block';
        document.getElementById('hint').style.display='block'; time=Date.now()/1000; render();
    }
    function toggleMusic() { const m=document.getElementById('bg-music'), b=document.getElementById('music-btn'); if(m.paused){m.play();b.innerText="🎵"}else{m.pause();b.innerText="🔇"} }
    function onResize() { dpr=window.devicePixelRatio||1; canvas.width=window.innerWidth*dpr; canvas.height=window.innerHeight*dpr; canvas.style.width=window.innerWidth+'px'; canvas.style.height=window.innerHeight+'px'; }
    window.onresize = onResize;
    </script>
</body>
</html>
